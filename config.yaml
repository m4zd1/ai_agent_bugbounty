agent:
  name: "BugBountyHunter"
  version: "1.0.0"
  mode: "auto"  # auto, manual, supervised
  
llm:
  primary_model: "gpt-4-turbo-preview"
  fallback_model: "gpt-3.5-turbo"
  temperature: 0.3
  max_tokens: 4000
  
reconnaissance:
  subdomain_enumeration:
    enabled: true
    tools: ["sublist3r", "assetfinder", "amass", "subfinder"]
    recursive: true
    max_depth: 3
    
  dns_enumeration:
    enabled: true
    record_types: ["A", "AAAA", "CNAME", "MX", "NS", "TXT", "SOA"]
    
  port_scanning:
    enabled: true
    ports: "common"  # common, all, custom
    common_ports: [21,22,23,25,53,80,110,111,135,139,143,443,445,993,995,1723,3306,3389,5900,8080,8443]
    rate_limit: 1000
    timeout: 5
    
  technology_detection:
    enabled: true
    tool: "wappalyzer"
    
  endpoint_discovery:
    enabled: true
    wordlist: "common"
    extensions: ["php", "asp", "aspx", "jsp", "do", "action", "html", "json", "xml"]
    
vulnerability_detection:
  sql_injection:
    enabled: true
    tool: "sqlmap"
    risk_levels: [1,2,3]
    
  xss:
    enabled: true
    payloads: ["basic", "advanced", "blind"]
    
  open_redirect:
    enabled: true
    
  ssrf:
    enabled: true
    
  xxe:
    enabled: true
    
  command_injection:
    enabled: true
    
  path_traversal:
    enabled: true
    
  subdomain_takeover:
    enabled: true
    
  misconfiguration:
    enabled: true
    checks: ["headers", "cors", "https", "directory_listing", "exposed_metadata"]

api_keys:
  shodan: ${SHODAN_API_KEY}
  censys: ${CENSYS_API_ID}:${CENSYS_API_SECRET}
  securitytrails: ${SECURITYTRAILS_API_KEY}
  virustotal: ${VIRUSTOTAL_API_KEY}
  
reporting:
  formats: ["html", "markdown", "json"]
  include_poc: true
  include_screenshots: true
  severity_scoring: "cvss"
  auto_save: true